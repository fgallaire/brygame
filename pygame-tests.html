<html lang="en">

<title>Brygame — the real pygame in the browser</title>
<style>
  html, body { margin: 0; background: #0e0e14; color: #ddd; font: 13px monospace; }
  #wrap { display: flex; gap: 16px; padding: 14px; align-items: flex-start; flex-wrap: wrap; }

<body>
<h1>Brygame — the real pygame-ce (C → WASM) in the browser</h1>
<p class="sub">A single <code>&lt;script src="wasthon-pygame.js"&gt;</code> + the 100%&nbsp;standard pygame code below. Zero install, zero plumbing.</p>
<div id="wrap">
  <canvas id="canvas" width="640" height="480"></canvas>
  <pre id="wp-log"></pre>
</div>

<script src="wasthon-pygame.js"></script>

<!-- ======= 100% standard pygame CODE — exactly what a student writes ======= -->
<script type="text/x-pygame">
import pygame
from pygame.locals import *

pygame.init()
screen = pygame.display.set_mode((640, 480))
pygame.display.set_caption("Brygame")

# gradient background
for y in range(480):
    t = y / 480
    pygame.draw.line(screen, (int(20 + 30 * t), int(24 + 10 * t), int(48 + 40 * t)), (0, y), (640, y))

# a row of breakout-style "bricks"
palette = [(230, 90, 90), (240, 170, 70), (240, 230, 90),
           (120, 210, 120), (100, 170, 240), (170, 130, 230)]
for i, col in enumerate(palette):
    pygame.draw.rect(screen, col, (40 + i * 95, 80, 85, 34), border_radius=6)

# some sprites (circles) via pygame.sprite
class Bubble(pygame.sprite.Sprite):
    def __init__(self, x, y, r, col):
        super().__init__()
        self.image = pygame.Surface((2 * r, 2 * r), pygame.SRCALPHA)
        pygame.draw.circle(self.image, col, (r, r), r)
        pygame.draw.circle(self.image, (255, 255, 255), (r - r // 3, r - r // 3), max(2, r // 4))
        self.rect = self.image.get_rect(center=(x, y))

balls = pygame.sprite.Group(
    Bubble(160, 260, 34, (240, 120, 120)),
    Bubble(330, 320, 46, (120, 200, 240)),
    Bubble(500, 250, 28, (240, 220, 120)),
)
balls.draw(screen)

# a paddle + a ball, using Vector2 and Rect
paddle = pygame.Rect(0, 0, 130, 16)
paddle.center = (320, 440)
pygame.draw.rect(screen, (235, 235, 245), paddle, border_radius=8)

pos = pygame.Vector2(320, 400)
pygame.draw.circle(screen, (255, 255, 255), (int(pos.x), int(pos.y)), 10)

# some text (SDL_ttf / FreeType)
big = pygame.font.Font(None, 44)
small = pygame.font.Font(None, 24)
screen.blit(big.render("import pygame  ✓", True, (255, 255, 255)), (150, 20))
screen.blit(small.render("pygame-ce " + pygame.ver + " — SDL " + ".".join(map(str, pygame.get_sdl_version())),
                         True, (170, 180, 210)), (150, 150))

pygame.display.flip()
print("scene rendered — pygame", pygame.ver)
</script>
</body>
</html>
