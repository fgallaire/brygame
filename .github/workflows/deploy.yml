name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Site statique deja construit : les artefacts _pygame.*, _imgui.* et
      # brython/ sont pre-compiles et versionnes -> aucune compilation ici.
      # On stage tout sauf le git/les workflows. Le deploy Pages via Actions
      # ne passe PAS par Jekyll -> les fichiers en _*.mjs sont servis (pas de
      # .nojekyll necessaire).
      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
