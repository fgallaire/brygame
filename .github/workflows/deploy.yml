name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only the deploy job needs Pages write / id-token; the build job just reads
# the repo. Splitting the two means a transient Pages-deploy failure is
# retried on its own — the from-source build is NOT re-run (mirrors
# wasthon's test/deploy split).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds _pygame.*, _imgui.*, wasthon-pygame.js, pygame/, brython/ from
      # source (clones wasthon + pins the external trees). No committed blobs.
      - name: Build WASM/mjs artifacts
        run: ./build.sh

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r loader/. _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
