name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds _pygame.*, _imgui.*, wasthon-pygame.js, pygame/, brython/ from
      # source (clones wasthon + pins the external trees). No committed blobs.
      - name: Build WASM/mjs artifacts
        run: ./build.sh

      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='.wasthon' \
            --exclude='_site' --exclude='build.sh' --exclude='.gitignore' \
            --exclude='pygame-poc' --exclude='gui-poc' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
